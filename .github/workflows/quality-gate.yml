name: quality-gate

on:
  push:
    branches:
      - main
      - "fix/**"
      - "feature/**"
  pull_request:
    branches:
      - main

jobs:
  flutter-checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Run widget tests
        run: flutter test --no-pub

  php-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"

      - name: Lint PHP files
        run: |
          find php -name "*.php" -print0 | xargs -0 -n1 php -l
