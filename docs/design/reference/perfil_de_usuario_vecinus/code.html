<!DOCTYPE html>

<script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        primary: "#4F8B8B",
                        "background-light": "#F8F9FA",
                        "background-dark": "#121212",

                    },
                    fontFamily: {
                        sans: ["Inter", "sans-serif"],
                    },
                    borderRadius: {

                },
            },
        };
        function toggleDarkMode() {
            document.documentElement.classList.toggle('dark');
        }

        @layer base {
            body {

            }
        }
        .nav-shadow {

        }
        .header-blur {
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }
