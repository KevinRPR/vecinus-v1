<!DOCTYPE html>
<html class="light" lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, viewport-fit=cover" name="viewport"/>
<title>Vecinus - Inicio de Sesión</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,typography,container-queries"></script>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet"/>
<script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        primary: "#539091",
                        "background-light": "#F8FAFC",
                        "background-dark": "#0F172A",
                        "input-border": "#E2E8F0",
                        "heading-dark": "#0F172A",
                        "text-muted": "#64748B",
                        "link-blue": "#3B82F6",
                    },
                    fontFamily: {
                        sans: ["Inter", "sans-serif"],
                        display: ["Inter", "sans-serif"],
                    },
                    borderRadius: {
                        DEFAULT: "12px",
                    },
                },
            },
        };
    </script>
<style type="text/tailwindcss">
        :root {
            --safe-area-inset-top: env(safe-area-inset-top);
        }
        body {
            font-family: 'Inter', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .ios-status-bar {
            height: var(--safe-area-inset-top, 44px);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark min-h-screen transition-colors duration-300 antialiased">
<div class="ios-status-bar w-full"></div>
<div class="max-w-md mx-auto flex flex-col min-h-[calc(100dvh-env(safe-area-inset-top))]">
<div class="flex justify-end px-6 pt-2">
<button class="p-2 rounded-full bg-white/80 dark:bg-slate-800/80 backdrop-blur-sm border border-input-border dark:border-slate-700 text-slate-600 dark:text-slate-300" onclick="document.documentElement.classList.toggle('dark')">
<span class="material-symbols-outlined block dark:hidden text-[20px]">dark_mode</span>
<span class="material-symbols-outlined hidden dark:block text-[20px]">light_mode</span>
</button>
</div>
<header class="flex flex-col items-center pt-4 pb-10 px-6">
<div class="relative w-16 h-16 mb-6 flex items-center justify-center">
<svg class="w-full h-full" fill="none" viewBox="0 0 100 80" xmlns="http://www.w3.org/2000/svg">
<path d="M10 50L45 20L80 50" stroke="#539091" stroke-linecap="round" stroke-linejoin="round" stroke-width="8"></path>
<path class="dark:stroke-slate-300" d="M25 65V45L45 28L65 45V65" stroke="#1E293B" stroke-linecap="round" stroke-linejoin="round" stroke-width="8"></path>
<circle cx="45" cy="12" fill="#FDBA74" r="6"></circle>
</svg>
</div>
<div class="text-center space-y-2">
<h1 class="text-3xl font-bold text-heading-dark dark:text-white tracking-tight">Bienvenido</h1>
<p class="text-text-muted dark:text-slate-400 text-sm font-medium">
                    Pagos, avisos y acuerdos comunitarios.
                </p>
</div>
</header>
<main class="flex-grow px-6">
<form class="space-y-6" onsubmit="event.preventDefault();">
<div class="space-y-2">
<label class="block text-sm font-semibold text-slate-700 dark:text-slate-300 ml-1" for="email">
                        Correo electrónico
                    </label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-400">mail</span>
<input class="w-full pl-12 pr-4 py-4 bg-white dark:bg-slate-800 border-input-border dark:border-slate-700 rounded-DEFAULT focus:ring-2 focus:ring-primary/20 focus:border-primary text-slate-900 dark:text-white placeholder:text-slate-400 dark:placeholder:text-slate-500 transition-all outline-none" id="email" placeholder="ejemplo@correo.com" type="email"/>
</div>
</div>
<div class="space-y-2">
<div class="flex justify-between items-center ml-1">
<label class="block text-sm font-semibold text-slate-700 dark:text-slate-300" for="password">
                            Contraseña
                        </label>
</div>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-400">lock</span>
<input class="w-full pl-12 pr-12 py-4 bg-white dark:bg-slate-800 border-input-border dark:border-slate-700 rounded-DEFAULT focus:ring-2 focus:ring-primary/20 focus:border-primary text-slate-900 dark:text-white placeholder:text-slate-400 dark:placeholder:text-slate-500 transition-all outline-none" id="password" placeholder="********" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 hover:text-primary transition-colors" type="button">
<span class="material-symbols-outlined">visibility</span>
</button>
</div>
</div>
<div class="flex justify-end">
<a class="text-xs font-semibold text-link-blue hover:text-blue-600 transition-colors" href="#">¿Olvidaste tu contraseña?</a>
</div>
<button class="w-full bg-primary hover:bg-[#457a7b] active:scale-[0.98] text-white font-bold py-4 rounded-DEFAULT shadow-lg shadow-primary/20 transition-all duration-200" type="submit">
                    Entrar
                </button>
</form>
<div class="mt-10 space-y-6">
<div class="bg-white dark:bg-slate-800/40 p-4 rounded-DEFAULT border border-input-border/60 dark:border-slate-700/50 flex items-start gap-3">
<span class="material-symbols-outlined text-primary text-[20px]">verified_user</span>
<div>
<p class="text-xs font-medium text-slate-700 dark:text-slate-300 leading-normal">
                            Tu información se guarda con trazabilidad y control.
                        </p>
<a class="text-xs font-bold text-link-blue hover:underline mt-1 inline-block" href="#">Más información</a>
</div>
</div>
<div class="flex justify-center items-center gap-2 py-2">
<span class="material-symbols-outlined text-link-blue text-[20px]">help_center</span>
<a class="text-sm font-bold text-link-blue hover:underline" href="#">
                        ¿Necesitas ayuda?
                    </a>
</div>
</div>
</main>
<footer class="pb-6 pt-4 flex flex-col items-center">
<div class="w-32 h-1.5 bg-slate-200 dark:bg-slate-800 rounded-full"></div>
</footer>
</div>

</body></html>
